name: c

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
      OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev libssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: fmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features --release --target x86_64-unknown-linux-gnu -- -D warnings

      - name: test
        run: cargo test --release --all-targets --all-features --target x86_64-unknown-linux-gnu

      - name: Build for Linux
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/osu-collect dist/osu-collect-linux-x64
          chmod +x dist/osu-collect-linux-x64
          cd dist && sha256sum osu-collect-linux-x64 > osu-collect-linux-x64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osu-collect-linux-x64
          if-no-files-found: error
          retention-days: 1
          path: |
            dist/osu-collect-linux-x64
            dist/osu-collect-linux-x64.sha256

  build-windows:
    runs-on: windows-latest
    env:
      OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
      OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: fmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features --release --target x86_64-pc-windows-msvc -- -D warnings

      - name: test
        run: cargo test --release --all-targets --all-features --target x86_64-pc-windows-msvc

      - name: Build for Windows
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package artifact
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/x86_64-pc-windows-msvc/release/osu-collect.exe dist/osu-collect-windows-x64.exe
          Get-FileHash dist/osu-collect-windows-x64.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  osu-collect-windows-x64.exe" } |
            Out-File -Encoding ascii dist/osu-collect-windows-x64.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osu-collect-windows-x64
          if-no-files-found: error
          retention-days: 1
          path: |
            dist/osu-collect-windows-x64.exe
            dist/osu-collect-windows-x64.exe.sha256

  build-macos:
    runs-on: macos-14
    env:
      OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
      OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install cmake

      - uses: Swatinem/rust-cache@v2

      - name: fmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features --release --target aarch64-apple-darwin -- -D warnings

      - name: test
        run: cargo test --release --all-targets --all-features --target aarch64-apple-darwin

      - name: Build for macOS (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/osu-collect dist/osu-collect-macos-arm64
          chmod +x dist/osu-collect-macos-arm64
          cd dist && shasum -a 256 osu-collect-macos-arm64 > osu-collect-macos-arm64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osu-collect-macos-arm64
          if-no-files-found: error
          retention-days: 1
          path: |
            dist/osu-collect-macos-arm64
            dist/osu-collect-macos-arm64.sha256
