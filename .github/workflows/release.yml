name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev libssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build for Linux
        env:
          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp target/x86_64-unknown-linux-gnu/release/osu-collect release/osu-collect-linux-x64
          chmod +x release/osu-collect-linux-x64
          cd release && sha256sum osu-collect-linux-x64 > osu-collect-linux-x64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-binary
          if-no-files-found: error
          path: |
            release/osu-collect-linux-x64
            release/osu-collect-linux-x64.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build for Windows
        env:
          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare artifact
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item target/x86_64-pc-windows-msvc/release/osu-collect.exe release/osu-collect-windows-x64.exe
          Get-FileHash release/osu-collect-windows-x64.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  osu-collect-windows-x64.exe" } |
            Out-File -Encoding ascii release/osu-collect-windows-x64.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-binary
          if-no-files-found: error
          path: |
            release/osu-collect-windows-x64.exe
            release/osu-collect-windows-x64.exe.sha256

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install cmake

      - uses: Swatinem/rust-cache@v2

      - name: Build for macOS (arm64)
        env:
          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
        run: cargo build --release --target aarch64-apple-darwin

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/osu-collect release/osu-collect-macos-arm64
          chmod +x release/osu-collect-macos-arm64
          cd release && shasum -a 256 osu-collect-macos-arm64 > osu-collect-macos-arm64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-binary
          if-no-files-found: error
          path: |
            release/osu-collect-macos-arm64
            release/osu-collect-macos-arm64.sha256

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-binary
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-binary
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-binary
          path: release

      - name: Generate SHA256SUMS
        run: |
          cat release/osu-collect-linux-x64.sha256 \
              release/osu-collect-windows-x64.exe.sha256 \
              release/osu-collect-macos-arm64.sha256 \
            > release/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/osu-collect-linux-x64
            release/osu-collect-linux-x64.sha256
            release/osu-collect-windows-x64.exe
            release/osu-collect-windows-x64.exe.sha256
            release/osu-collect-macos-arm64
            release/osu-collect-macos-arm64.sha256
            release/SHA256SUMS
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
