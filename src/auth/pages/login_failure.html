<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>login failed — osu-collect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #43ABE5;
    --danger: #F38BA8;
    --bg: #1E1E2E;
    --bg-raised: #181825;
    --line: #313244;
    --line-soft: #26263A;
    --text: #CDD6F4;
    --text-dim: #A6ADC8;
    --text-faint: #7F849C;
    --radius: 1px;
    --font-sans: "Rubik", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 44px;
    max-width: 560px;
    width: 100%;
    animation: rise 260ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font: 450 11px/1 var(--font-sans);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
  }
  .eyebrow-rule {
    flex: 1;
    height: 1px;
    background: var(--line-soft);
  }
  .heading {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .icon {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: color-mix(in oklch, var(--danger) 12%, transparent);
    border: 1px solid color-mix(in oklch, var(--danger) 30%, transparent);
    border-radius: var(--radius);
    color: var(--danger);
    flex-shrink: 0;
  }
  .icon svg { width: 22px; height: 22px; }
  .title {
    font: 550 26px/1.2 var(--font-sans);
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .hint {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-faint);
    padding-top: 18px;
    border-top: 1px solid var(--line-soft);
  }
  .hint svg { width: 14px; height: 14px; color: var(--text-dim); flex-shrink: 0; }
  @media (max-width: 520px) {
    .card { padding: 28px; }
  }
</style>
</head>
<body>
  <main class="card" role="alert">
    <div class="eyebrow">
      <span>osu-collect</span>
      <span class="eyebrow-rule"></span>
    </div>

    <div class="heading">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 6l12 12M18 6l-12 12"/>
        </svg>
      </span>
      <h1 class="title">login failed</h1>
    </div>

    <p class="hint">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="6.5"/><path d="M8 7v4M8 5v.5"/>
      </svg>
      close this tab and try again from the app
    </p>
  </main>
</body>
</html>
