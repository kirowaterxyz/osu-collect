[package]
name = "osu-collect"
version = "0.2.0"
edition = "2024"
authors = ["uwuclxdy"]
description = "a program to download osu map collections from osu!collector for free"
license = "MIT"

[dependencies]
reqwest = { version = "0.12.24", features = ["json", "stream"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
semver = "1.0.27"
url = "2.5.7"
toml = "0.9.8"
dirs = "6.0.0"
tokio = { version = "1.48.0", features = ["full"] }
futures-util = "0.3.31"
osu-db = "0.3.0"
ratatui = { version = "0.29.0", default-features = false, features = ["crossterm"] }
crossterm = "0.29.0"
md-5 = "0.10.6"
zip = { version = "6.0.0", default-features = false, features = ["deflate"] }
tracing = "0.1.43"
tracing-subscriber = { version = "0.3.22", features = ["fmt", "env-filter", "json"] }
tracing-appender = "0.2.4"
regex-lite = "0.1.8"
whoami = "1.6.1"
cxx = "1.0"

[build-dependencies]
cxx-build = "1.0"
cmake = "0.1"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = ["Win32_System_Console", "Win32_Foundation"] }
